                KodaiRateIQ

<span class="text-secondary opacity-90">Absolute precision.</span>
</p>

<div class="mt-phi-xxl inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-primary/20 bg-surface-container-lowest/40 backdrop-blur-md shadow-[0_0_20px_rgba(78,222,163,0.05)]">
<span class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(78,222,163,0.8)]"></span>

</div>
</div>

<p class="font-body-md text-body-md text-on-surface-variant font-light">Secure gateway to global intelligence.</p>

<label class="absolute left-0 top-phi-sm font-body-md text-body-md text-on-surface-variant/70 transition-all peer-focus:-top-4 peer-focus:text-[12px] peer-focus:text-primary peer-valid:-top-4 peer-valid:text-[12px] peer-valid:text-on-surface-variant pointer-events-none" for="email">

</div>
<!-- Password Input -->

<input class="w-full bg-transparent border-0 border-b border-outline-variant/50 px-0 py-phi-sm font-body-md text-body-md text-on-background placeholder-transparent focus:ring-0 focus:border-primary peer transition-colors" id="password" placeholder="Security Key" required="" type="password"/>
<label class="absolute left-0 top-phi-sm font-body-md text-body-md text-on-surface-variant/70 transition-all peer-focus:-top-4 peer-focus:text-[12px] peer-focus:text-primary peer-valid:-top-4 peer-valid:text-[12px] peer-valid:text-on-surface-variant pointer-events-none" for="password">

                        </label>
<button class="absolute right-0 top-phi-sm text-on-surface-variant/50 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>

<input class="peer sr-only" type="checkbox"/>
<span class="material-symbols-outlined filled-icon text-[14px] text-primary opacity-0 peer-checked:opacity-100 absolute transition-opacity">check</span>
</div>
<span class="font-body-md text-body-md text-on-surface-variant text-[14px]">Remember Device</span>
</label>

<span class="material-symbols-outlined text-[18px] relative z-10 group-hover/btn:translate-x-1 transition-transform">arrow_forward</span>

<div class="absolute inset-0 bg-gradient-to-r from-transparent via-primary/10 to-transparent -translate-x-full group-hover/btn:translate-x-full transition-transform duration-1000 ease-in-out"></div>
</button>
